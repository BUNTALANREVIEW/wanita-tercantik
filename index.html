<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Surat untuk Qonitah | Akbaar</title>
    <meta name="description"
        content="Sebuah surat digital spesial dengan animasi amplop untuk Qonitah Nailah Salsabila" />
    <meta name="author" content="AKBAAR" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            font-size: 14px;
            --color-text: #e8eef9;
            --color-bg: #0a0f1a;
            --color-link: #7e9ac9;
            --color-link-hover: #b8cef0;
            --anim-time-1: 5s;
            --anim-time-2: 5s;
            --anim-delay-first: 1s;
            --anim-delay-second: calc(var(--anim-delay-first) + var(--anim-time-1) + 0.5s);
            --anim-time-total: calc(var(--anim-time-1) + var(--anim-time-2) + var(--anim-delay-first) + 1s);
            --color-title: #eef3fc;
            --color-accent: #6c91c2;
            --color-accent-soft: rgba(108, 145, 194, 0.15);
            --pink-soft: #d4a5b0;
        }

        body {
            margin: 0;
            color: var(--color-text);
            background-color: var(--color-bg);
            font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            letter-spacing: 0.04em;
            min-height: 100vh;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hidden {
            position: absolute;
            overflow: hidden;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        .p5_loading {
            background: var(--color-bg);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }

        .p5_loading__inner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-top-color: var(--color-accent);
            border-right-color: rgba(108, 145, 194, 0.3);
            animation: loaderSpin 1s ease-in-out infinite;
        }

        @keyframes loaderSpin {
            to {
                transform: rotate(360deg);
            }
        }

        a {
            text-decoration: none;
            color: var(--color-link);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--color-link-hover);
        }

        /* Frame - dihide untuk mobile agar lebih rapi, tapi tetap ada strukturnya */
        .frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            z-index: 1500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .frame__title {
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--color-accent);
            text-transform: uppercase;
            pointer-events: none;
        }

        /* Sembunyikan tombol toggle audio */
        .toggle {
            display: none;
        }

        /* INTRO SCREENS */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1600;
        }

        .screen--grid {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
        }

        .screen--flex {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            pointer-events: auto;
            background: var(--color-bg);
        }

        .start-anim .intro {
            animation: fadeOutIntro 0.8s var(--anim-time-total) forwards;
        }

        @keyframes fadeOutIntro {
            to {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        }

        .intro__content {
            font-family: 'Cormorant Garamond', serif;
            font-size: 8vw;
            font-style: italic;
            font-weight: 300;
            text-align: center;
            margin: 0;
            opacity: 0;
            color: var(--color-title);
            letter-spacing: 0.05em;
            position: absolute;
            width: 100%;
            padding: 0 20px;
        }

        @media (min-width: 768px) {
            .intro__content {
                font-size: 3vw;
            }
        }

        .intro__content-line {
            display: block;
            margin: 0.8rem 0;
        }

        .intro__content-line--small {
            font-family: 'Jost', sans-serif;
            font-size: 0.75rem;
            font-style: normal;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--color-accent);
            opacity: 0.85;
        }

        @media (min-width: 768px) {
            .intro__content-line--small {
                font-size: 0.85rem;
            }
        }

        .start-anim .intro__content:first-child {
            animation: fadeInOutIntro1 var(--anim-time-1) var(--anim-delay-first) forwards;
        }

        .start-anim .intro__content:last-child {
            animation: fadeInOutIntro2 var(--anim-time-2) var(--anim-delay-second) forwards;
        }

        @keyframes fadeInOutIntro1 {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }

            15% {
                opacity: 1;
                transform: translateY(0);
            }

            85% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-15px);
                visibility: hidden;
            }
        }

        @keyframes fadeInOutIntro2 {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }

            15% {
                opacity: 1;
                transform: translateY(0);
            }

            85% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-15px);
                visibility: hidden;
            }
        }

        .action__line {
            margin: 1rem 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-style: italic;
            font-weight: 300;
            color: var(--color-title);
            letter-spacing: 0.05em;
            text-align: center;
        }

        @media (min-width: 768px) {
            .action__line {
                font-size: 1.8rem;
            }
        }

        .start-anim .action {
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .button--box {
            pointer-events: auto;
            background: transparent;
            color: var(--color-accent);
            border: 1px solid var(--color-accent);
            padding: 0.7rem 2rem;
            font-family: 'Jost', sans-serif;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        @media (min-width: 768px) {
            .button--box {
                padding: 0.75rem 3rem;
                font-size: 0.8rem;
            }
        }

        .button--box:hover {
            color: var(--color-link-hover);
            border-color: var(--color-link-hover);
            box-shadow: 0 0 24px rgba(108, 145, 194, 0.2);
        }

        /* AMPLOP DESIGN */
        .envelope-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 15, 26, 0.98) 0%, rgba(20, 25, 45, 0.96) 100%);
            backdrop-filter: blur(12px);
            z-index: 1800;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.5s ease;
            pointer-events: none;
        }

        .envelope-screen.active {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }

        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .envelope-container {
            position: relative;
            width: 320px;
            max-width: 85vw;
            height: 240px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        @media (min-width: 768px) {
            .envelope-container {
                width: 400px;
                height: 280px;
            }
        }

        .envelope-container:hover {
            transform: translateY(-5px);
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #2a2e3f, #1e2230);
            border-radius: 16px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(212, 165, 176, 0.3);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #383e58, #2c3048);
            clip-path: polygon(0% 0%, 50% 48%, 100% 0%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top;
            z-index: 3;
            cursor: pointer;
            border-bottom: 1px solid rgba(212, 165, 176, 0.4);
        }

        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 68%;
            background: linear-gradient(145deg, #25293a, #1b1f2c);
            border-radius: 0 0 16px 16px;
        }

        .stamp {
            position: absolute;
            bottom: 12px;
            right: 12px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.65rem;
            color: rgba(212, 165, 176, 0.7);
            background: rgba(212, 165, 176, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(212, 165, 176, 0.3);
        }

        @media (min-width: 768px) {
            .stamp {
                font-size: 0.75rem;
                padding: 4px 10px;
            }
        }

        .letter-inside {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 0;
            background: linear-gradient(145deg, #fefaf5, #f5efe5);
            border-radius: 14px 14px 10px 10px;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.15s;
            overflow: hidden;
            text-align: center;
            z-index: 2;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .envelope-container.open .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-container.open .letter-inside {
            height: 210px;
            bottom: 10px;
            padding: 18px 12px;
        }

        @media (min-width: 768px) {
            .envelope-container.open .letter-inside {
                height: 240px;
                padding: 20px 16px;
            }
        }

        .letter-preview {
            font-family: 'Cormorant Garamond', serif;
            color: #3a3025;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.4s 0.45s;
        }

        .envelope-container.open .letter-preview {
            opacity: 1;
        }

        .letter-preview p:first-child {
            font-size: 1rem;
            font-weight: 500;
            color: #8b5e6b;
            border-bottom: 1px solid #e0cdb8;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        @media (min-width: 768px) {
            .letter-preview p:first-child {
                font-size: 1.2rem;
            }
        }

        .btn-reveal-content {
            background: linear-gradient(135deg, #6c91c2, #5a7cab);
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 400;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: 'Jost', sans-serif;
            transition: all 0.25s ease;
        }

        @media (min-width: 768px) {
            .btn-reveal-content {
                padding: 8px 26px;
                font-size: 0.8rem;
            }
        }

        .envelope-hint {
            margin-top: 20px;
            text-align: center;
            color: #8fa5cc;
            background: rgba(10, 15, 26, 0.6);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 165, 176, 0.3);
        }

        @media (min-width: 768px) {
            .envelope-hint {
                margin-top: 30px;
                padding: 8px 24px;
                font-size: 0.75rem;
            }
        }

        /* KONTEN UTAMA - RATA TENGAH SEMPURNA */
        .main-content {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 80px 16px 40px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .main-content.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .content-card {
            background: rgba(20, 25, 40, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            width: 100%;
            max-width: 550px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(108, 145, 194, 0.3);
        }

        @media (min-width: 768px) {
            .content-card {
                max-width: 650px;
                padding: 2.5rem 2rem;
                border-radius: 40px;
            }
        }

        .content__subtitle {
            font-family: 'Jost', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: #8fa5cc;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            .content__subtitle {
                font-size: 0.75rem;
                margin-bottom: 1rem;
            }
        }

        .content__title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            font-style: italic;
            color: #eef3fc;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
            word-break: keep-all;
        }

        @media (min-width: 768px) {
            .content__title {
                font-size: 2.5rem;
            }
        }

        /* Elemen konten */
        .hidden-content {
            display: none;
            animation: fadeInUp 0.5s ease forwards;
        }

        .hidden-content.show {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-message {
            color: #c5d0e6;
            font-size: 0.9rem;
            line-height: 1.7;
            margin: 1.2rem 0;
            text-align: center;
        }

        @media (min-width: 768px) {
            .content-message {
                font-size: 0.95rem;
                margin: 1.5rem 0;
            }
        }

        .next-btn {
            background: linear-gradient(135deg, #6c91c2, #5a7cab);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Jost', sans-serif;
            transition: all 0.25s ease;
            margin: 15px 0 8px;
            letter-spacing: 1px;
        }

        @media (min-width: 768px) {
            .next-btn {
                padding: 12px 32px;
                font-size: 0.9rem;
                margin: 20px 0 10px;
            }
        }

        .next-btn:hover {
            background: linear-gradient(135deg, #7ea2d4, #6c8cbd);
            transform: scale(1.02);
        }

        .progress-info {
            color: #6c7a99;
            font-size: 0.65rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        @media (min-width: 768px) {
            .progress-info {
                font-size: 0.7rem;
            }
        }

        .video-button {
            background: transparent;
            border: 1px solid #6c91c2;
            padding: 8px 24px;
            border-radius: 40px;
            color: #e8eef9;
            font-weight: 400;
            cursor: pointer;
            margin: 12px 0;
            transition: 0.2s;
            font-family: 'Jost', sans-serif;
            font-size: 0.8rem;
        }

        @media (min-width: 768px) {
            .video-button {
                padding: 10px 28px;
                margin: 15px 0;
                font-size: 0.85rem;
            }
        }

        .footer-credit {
            font-size: 0.65rem;
            color: #6c7a99;
            margin-top: 15px;
        }

        @media (min-width: 768px) {
            .footer-credit {
                font-size: 0.7rem;
                margin-top: 20px;
            }
        }

        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .video-modal.active {
            display: flex;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 500px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .video-container {
                max-width: 700px;
                border-radius: 20px;
            }
        }

        .video-container video {
            width: 100%;
            height: auto;
            display: block;
        }

        .close-video {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .close-video {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }
        }
    </style>
    <script>document.documentElement.className = "js";</script>
</head>

<body>

    <div class="frame">
        <h1 class="frame__title">QC QONITAH CANTIK</h1>
        <button class="toggle toggle--on button" id="toggle-btn" style="display:none;"></button>
    </div>

    <!-- INTRO ANIMASI -->
    <div class="screen screen--grid intro">
        <p class="intro__content">
            <span class="intro__content-line">AKBAAR</span>
            <span class="intro__content-line intro__content-line--small">GABUUUT AJAA SIII 🤍</span>
            <span class="intro__content-line intro__content-line--small">Semogaaaa sukaaa</span>
        </p>
        <p class="intro__content">
            <span class="intro__content-line intro__content-line--small">✨ Website Spesial Dibuat Untuk ✨</span>
            <span class="intro__content-line">Qonitah Nailah Salsabila</span>
        </p>
    </div>
    <div class="screen screen--flex action">
        <span class="action__line">Hai, Bociiiil ❤️</span>
        <button id="play-btn" class="button--box">Mulai Sekarang</button>
    </div>

    <!-- LAYAR AMPLOP -->
    <div id="envelopeScreen" class="envelope-screen">
        <div class="envelope-wrapper">
            <div id="envelopeContainer" class="envelope-container">
                <div class="envelope" id="envelope">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <div class="stamp">UNTUK BOCIL ❤️</div>
                    <div class="letter-inside" id="letterInside">
                        <div class="letter-preview">
                            <p>AYOOOOOOO DONG DI BUKAA</p>
                            <p style="font-size: 0.8rem;">Untuk seseorang yang istimewa</p>
                            <button id="revealContentBtn" class="btn-reveal-content">Buka Surat</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="envelope-hint">sentuh amplop untuk membuka</div>
        </div>
    </div>

    <!-- KONTEN UTAMA -->
    <div id="mainContent" class="main-content">
        <div class="content-card">
            <div class="content__subtitle">Selamat pagi, Qonitah</div>
            <h2 class="content__title">QONITAH NAILAH SALSABILA</h2>
            <div id="stepContent"></div>
            <button id="nextStepBtn" class="next-btn">Lanjutkan</button>
            <div id="progressInfo" class="progress-info"></div>
        </div>
    </div>

    <!-- MODAL VIDEO -->
    <div id="videoModal" class="video-modal">
        <div class="video-container">
            <button class="close-video" id="closeVideoBtn">×</button>
            <video id="myVideo" controls>
                <source src="audio/video.mp4" type="video/mp4">
                Browser tidak support video.
            </video>
        </div>
    </div>

    <div id="p5_loading" class="p5_loading">
        <div class="p5_loading__inner"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.8.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.8.0/addons/p5.sound.min.js"></script>
    <script>
        let globalAudio = null;
        let wasPlayingBeforeVideo = false;

        const contents = [
            { type: 'message', text: '👋 Hai, makasih ya udah buka ini. Aku bikin ini khusus buat kamu.' },
            { type: 'message', text: '🙂 Semoga kamu suka ya. Cuma hal kecil sih, tapi aku pengen kamu tahu kalau kamu itu berarti.' },
            { type: 'message', text: '💬 Kalau ada apa-apa, cerita aja ya. Aku ada kok, dengerin kamu.' },
            { type: 'message', text: '📘 Semangat kuliahnya! Jangan terlalu dipaksain juga, istirahat tetep penting.' },
            { type: 'message', text: '🍽️ Jangan lupa makan ya, apalagi sarapan. Tolong dijaga kesehatannya.' },
            { type: 'message', text: '🎯 Kejar terus apa yang kamu mau. Aku bakal dukung kamu.' },
            { type: 'message', text: '🌱 Kamu udah cukup dengan jadi diri kamu sendiri, gak perlu ngerasa kurang.' },
            { type: 'video', text: 'Tonton video spesial ini ya', hasButton: true },
            { type: 'footer', text: 'Dibuat oleh AKBAAAAAR YANG GABUT ❤️', isFooter: true }
        ];

        let currentStep = 0;
        let contentRevealed = false;
        let stepsContainer = null;
        let nextBtn = null;
        let progressSpan = null;

        function showStep(step) {
            if (!stepsContainer) return;
            stepsContainer.innerHTML = '';

            if (step >= contents.length) {
                if (nextBtn) { nextBtn.disabled = true; nextBtn.style.opacity = '0.5'; }
                if (progressSpan) progressSpan.textContent = 'Selesai! Terima kasih 💖';
                return;
            }

            const content = contents[step];
            const div = document.createElement('div');
            div.className = 'hidden-content show';

            if (content.type === 'message') {
                div.innerHTML = `<div class="content-message">${content.text}</div>`;
            } else if (content.type === 'video') {
                div.innerHTML = `
                    <div class="content-message" style="text-align: center;">
                        <p>${content.text}</p>
                        <button id="stepVideoBtn" class="video-button">🎬 Tonton Video Spesial 🎬</button>
                    </div>
                `;
            } else if (content.type === 'footer') {
                div.innerHTML = `<div class="footer-credit">${content.text}</div>`;
            }

            stepsContainer.appendChild(div);
            if (progressSpan) progressSpan.textContent = `${step + 1} dari ${contents.length}`;

            if (content.type === 'video') {
                const videoBtn = document.getElementById('stepVideoBtn');
                if (videoBtn) {
                    videoBtn.addEventListener('click', function () {
                        if (globalAudio && globalAudio.isPlaying()) {
                            wasPlayingBeforeVideo = true;
                            globalAudio.pause();
                        } else wasPlayingBeforeVideo = false;
                        videoModal.classList.add('active');
                        if (myVideo) myVideo.play();
                    });
                }
            }
        }

        function nextStep() {
            if (currentStep < contents.length - 1) {
                currentStep++;
                showStep(currentStep);
            } else if (currentStep === contents.length - 1) {
                currentStep++;
                showStep(currentStep);
            }
        }

        const videoModal = document.getElementById('videoModal');
        const closeVideoBtn = document.getElementById('closeVideoBtn');
        const myVideo = document.getElementById('myVideo');

        function closeVideo() {
            videoModal.classList.remove('active');
            if (myVideo) { myVideo.pause(); myVideo.currentTime = 0; }
            if (wasPlayingBeforeVideo && globalAudio && !globalAudio.isPlaying()) {
                globalAudio.loop();
                globalAudio.setVolume(0.3);
            }
        }

        if (closeVideoBtn) closeVideoBtn.addEventListener('click', closeVideo);
        if (videoModal) videoModal.addEventListener('click', (e) => { if (e.target === videoModal) closeVideo(); });

        const envelopeScreen = document.getElementById('envelopeScreen');
        const envelopeContainer = document.getElementById('envelopeContainer');
        const revealContentBtn = document.getElementById('revealContentBtn');
        const mainContentDiv = document.getElementById('mainContent');
        const playBtn = document.getElementById('play-btn');

        let envelopeOpened = false;

        if (playBtn) {
            playBtn.addEventListener('click', () => {
                document.body.classList.add('start-anim');
                if (globalAudio && !globalAudio.isPlaying()) {
                    globalAudio.loop();
                    globalAudio.setVolume(0.3);
                }
                const style = getComputedStyle(document.documentElement);
                const time1 = parseFloat(style.getPropertyValue('--anim-time-1').trim()) || 5;
                const time2 = parseFloat(style.getPropertyValue('--anim-time-2').trim()) || 5;
                const delay1 = parseFloat(style.getPropertyValue('--anim-delay-first').trim()) || 1;
                const totalIntroDuration = (delay1 + time1 + 0.5 + time2) * 1000;
                setTimeout(() => {
                    if (envelopeScreen && !contentRevealed) envelopeScreen.classList.add('active');
                }, totalIntroDuration + 300);
            });
        }

        function openEnvelope() {
            if (envelopeOpened) return;
            envelopeOpened = true;
            envelopeContainer.classList.add('open');
        }

        const envelopeDiv = document.getElementById('envelope');
        if (envelopeDiv) envelopeDiv.addEventListener('click', (e) => { e.stopPropagation(); if (!envelopeOpened) openEnvelope(); });

        if (revealContentBtn) {
            revealContentBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!envelopeOpened) openEnvelope();
                stepsContainer = document.getElementById('stepContent');
                nextBtn = document.getElementById('nextStepBtn');
                progressSpan = document.getElementById('progressInfo');
                currentStep = 0;
                showStep(0);
                if (nextBtn) {
                    const newNextBtn = nextBtn.cloneNode(true);
                    nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
                    nextBtn = newNextBtn;
                    nextBtn.addEventListener('click', nextStep);
                }
                setTimeout(() => {
                    envelopeScreen.classList.remove('active');
                    mainContentDiv.classList.add('visible');
                    contentRevealed = true;
                }, 300);
                if (globalAudio && !globalAudio.isPlaying()) { globalAudio.loop(); globalAudio.setVolume(0.3); }
            });
        }

        const s = (p) => {
            let shaderProg, bgTex, fft, audioTrack;
            p.preload = () => {
                audioTrack = p.loadSound('audio/lagu.mp3', () => { globalAudio = audioTrack; }, (err) => console.log("Musik tidak ditemukan"));
                const vert = `attribute vec3 aPosition;attribute vec2 aTexCoord;varying vec2 vTexCoord;void main(){vTexCoord=aTexCoord;vec4 pos=vec4(aPosition,1.0);pos.xy=pos.xy*2.0;gl_Position=pos;}`;
                const frag = `uniform sampler2D u_texture;uniform float u_time;uniform float u_bass;varying vec2 vTexCoord;void main(){vec2 uv=vTexCoord;float wave=sin(uv.y*15.0+u_time*2.0)*0.02*u_bass;uv.x+=wave;vec4 color=texture2D(u_texture,uv);color.rgb+=vec3(u_bass*0.08);gl_FragColor=color;}`;
                shaderProg = p.createShader(vert, frag);
                let pg = p.createGraphics(512, 512);
                pg.background(10, 15, 26);
                for (let i = 0; i < 150; i++) { pg.stroke(108 + i % 50, 145 + i % 40, 194 - i % 30, 60); pg.noFill(); pg.ellipse(256, 256, 280 - i, 280 - i); }
                pg.fill(108, 145, 194, 80); pg.textSize(140); pg.textAlign(p.CENTER, p.CENTER); pg.text('❤️', 256, 280);
                bgTex = pg.get();
            };
            p.setup = () => { p.pixelDensity(1); p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL); fft = new p5.FFT(); p.shader(shaderProg); shaderProg.setUniform('u_texture', bgTex); };
            p.draw = () => { let bass = 0; if (audioTrack && audioTrack.isPlaying()) { fft.analyze(); bass = p.constrain(fft.getEnergy("bass") / 220, 0, 0.7); } else bass = p.sin(p.frameCount * 0.02) * 0.05 + 0.1; shaderProg.setUniform('u_time', p.millis() / 1000); shaderProg.setUniform('u_bass', bass); p.rect(0, 0, p.width, p.height); };
            p.windowResized = () => { p.resizeCanvas(p.windowWidth, p.windowHeight); };
        };
        new p5(s);

        window.addEventListener('load', () => { setTimeout(() => { let ld = document.getElementById('p5_loading'); if (ld) { ld.style.opacity = '0'; setTimeout(() => ld.style.display = 'none', 500); } }, 500); });
    </script>
</body>
